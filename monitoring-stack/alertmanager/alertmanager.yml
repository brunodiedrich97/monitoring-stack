global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'SEU_WEBHOOK_AQUI'
        channel: '#alertas-monitoramento'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: >-
          *Descricao:* {{ .CommonAnnotations.description }}
          *Severidade:* `{{ .CommonLabels.severity }}`
          *Runbook:* <{{ .CommonAnnotations.runbook_url }}|Clique aqui para resolver>