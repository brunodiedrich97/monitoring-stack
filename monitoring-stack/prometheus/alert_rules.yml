groups:
  - name: infra_alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instancia {{ $labels.instance }} fora do ar!"
          description: "Scrape falhando por mais de 1 minuto na instancia."
          runbook_url: "https://github.com/runbooks/infra/instance-down.md"

      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 85
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Uso de CPU elevado em {{ $labels.instance }}"
          description: "Consumo de CPU atingiu {{ printf \"%.2f\" $value }}%."
          runbook_url: "https://github.com/runbooks/infra/high-cpu.md"

  - name: application_alerts
    rules:
      - alert: HighHttp5xxRate
        expr: sum by(instance) (rate(payment_requests_total{status=~"5.."}[2m])) / sum by(instance) (rate(payment_requests_total[2m])) * 100 > 5
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Erros 5xx na API de Pagamentos"
          description: "Mais de 5% das chamadas resultaram em falha do servidor."
          runbook_url: "https://github.com/runbooks/apps/http-5xx.md"

  - name: security_alerts
    rules:
      - alert: HighRequestRate
        expr: rate(nginx_http_requests_total[1m]) > 100
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "Alto volume de requisições no Nginx"
          description: "Mais de 200 req/s detectadas no Nginx. Possível Scan ou Brute Force."
          runbook_url: "https://github.com/runbooks/security/high-rate.md"