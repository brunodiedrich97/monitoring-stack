events {}

http {
    upstream payment_backend {
        server payment-api:8080;
    }

    server {
        listen 80;

        # Rota da API de Pagamentos
        location /api/payments {
            proxy_pass http://payment_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Rota de métricas interna do Nginx (Exclusiva para o exporter)
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1; # Permite apenas o agente local ler
            allow 172.16.0.0/12; # Permite a rede interna do Docker
            deny all;
        }

        # Catch-all: encaminha demais rotas para a API (permite detectar varreduras)
        location / {
            proxy_pass http://payment_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}